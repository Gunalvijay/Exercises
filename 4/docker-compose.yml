services:
  blue:
    image: nginx
    container_name: blue
    ports:
      - "8081:80"
    volumes:
      - ./site-blue:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
  green:
    image: nginx
    container_name: green
    ports:
      - "8082:80"
    volumes:
      - ./site-green:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
  red:
    image: nginx
    container_name: red
    ports:
      - "8083:80"
    volumes:
      - ./site-red:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro